name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Get dependencies
        run: go mod download

      - name: Build x-ui
        run: |
          CGO_ENABLED=0 go build -o x-ui -ldflags "-s -w" .

      - name: Prepare files
        run: |
          mkdir -p release/x-ui/bin
          cp x-ui release/x-ui/
          cp x-ui.sh release/x-ui/
          cp x-ui.service.debian release/x-ui/
          cp x-ui.service.rhel release/x-ui/
          cp x-ui.service.arch release/x-ui/
          cp x-ui.rc release/x-ui/
          cp xray/xray release/x-ui/bin/

      - name: Build amd64
        run: |
          cd release
          tar -czvf x-ui-linux-amd64.tar.gz x-ui

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: x-ui-linux-amd64
          path: release/x-ui-linux-amd64.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release/x-ui-linux-amd64.tar.gz
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
